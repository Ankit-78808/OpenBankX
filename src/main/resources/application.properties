# ========== OpenBankX — Application Properties ==========

# Server
server.port=8081

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/openbankxf
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson — Pretty-print JSON in responses
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.cts.openbankx=INFO

logging.file.name=logs/openbankx.log

# ---- Log levels ----
logging.level.root=INFO

# ---- Log patterns ----

# Console (colored, readable)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n

# File (no color, clean)
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# === JWT CONFIG ===
app.jwt.secret=MySuperSecureJwtSecretKeyWithAtLeast32Chars!!
app.jwt.expiration-ms=3600000
