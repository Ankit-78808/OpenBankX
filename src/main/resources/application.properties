spring.application.name=openbankx
spring.datasource.url=jdbc:mysql://localhost:3306/openbankx
spring.datasource.username=root
spring.datasource.password=vishmitha@7605
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
server.port=8081

spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Do not force snake_case/lowercase; keep the names you specified in @Table/@Column
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# (Optional) Quote identifiers so Hibernate preserves exact case as given
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

